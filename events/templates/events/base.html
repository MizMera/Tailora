{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tailora{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    {% block extra_css %}{% endblock %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Istok+Web:wght@400;700&display=swap" rel="stylesheet">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="tailora-container page-reveal {% block container_class %}{% endblock %}">
        <!-- Header -->
        <header class="tailora-header">
            <a href="{% url 'events:list' %}" class="tailora-logo">Tailora</a>
            <nav class="tailora-nav">
                
            </nav>
        </header>

        <!-- Content Area -->
        <div class="tailora-content">
            {% block content %}{% endblock %}
        </div>
    </div>

    {% block extra_js %}{% endblock %}
    <script src="{% static 'js/confirm-modal.js' %}"></script>
</body>
</html>
